networks:
  network_public:
    external: true

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helpdesk}
      POSTGRES_USER: ${POSTGRES_USER:-helpdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_change_me}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - network_public
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "helpdesk", "-d", "helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - network_public
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  app:
    image: bartolomeusilva/go-help-desk:${DOCKERHUB_IMAGE:-1.0.10}
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-helpdesk}:${POSTGRES_PASSWORD:-postgres_password_change_me}@db:5432/${POSTGRES_DB:-helpdesk}?sslmode=disable
      BASE_URL: https://gohelpdesk.ichatbot.com.br
      SESSION_SECRET: ${SESSION_SECRET:-session_secret_change_me}
      JWT_SECRET: ${JWT_SECRET:-jwt_secret_change_me}
      HTTP_PORT: 8080
      CLAMAV_ADDR: tcp://clamav:3310
      # Email (SMTP/Resend) is configured in the app: Admin → Settings → Email.
      # Feature Flags
      GUEST_SUBMISSION_ENABLED: ${GUEST_SUBMISSION_ENABLED:-false}
      SLA_ENABLED: ${SLA_ENABLED:-false}
      MFA_ENABLED: ${MFA_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - attachments_data:/data/attachments
    networks:
      - network_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1.5GB
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.gohelpdesk.rule=Host(`gohelpdesk.ichatbot.com.br`)"
        - "traefik.http.routers.gohelpdesk.entrypoints=websecure"
        - "traefik.http.routers.gohelpdesk.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.gohelpdesk.loadbalancer.server.port=8080"

volumes:
  db_data:
    driver: local
  clamav_data:
    driver: local
  attachments_data:
    driver: local
